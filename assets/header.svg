<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SNOOFI — the goodest boy on the blockchain">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset=".34" stop-color="#C9CDD6"/>
      <stop offset=".5" stop-color="#62666F"/>
      <stop offset=".66" stop-color="#EDEFF3"/>
      <stop offset="1" stop-color="#8E939C"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".55" r=".75">
      <stop offset="0" stop-color="#00C805" stop-opacity=".14"/>
      <stop offset=".6" stop-color="#00C805" stop-opacity=".04"/>
      <stop offset="1" stop-color="#00C805" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx=".85" cy=".5" r=".5">
      <stop offset="0" stop-color="#FF4500" stop-opacity=".08"/>
      <stop offset="1" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    <style>
      .eyebrow{font:700 15px 'Segoe UI',Arial,sans-serif;letter-spacing:7px;fill:#00C805}
      .big{font:900 128px 'Arial Black','Segoe UI',Arial,sans-serif;fill:url(#chrome);letter-spacing:2px}
      .tag{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#8A8D99}
      @keyframes sway{0%,100%{transform:rotate(-9deg)}50%{transform:rotate(9deg)}}
      @keyframes blink{0%,90%,100%{transform:scaleY(1)}94%{transform:scaleY(.08)}}
      @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
      @keyframes tw{0%,100%{opacity:.12}50%{opacity:.75}}
      .antenna{transform-origin:0px -38px;animation:sway 3.2s ease-in-out infinite}
      .eye{transform-box:fill-box;transform-origin:center;animation:blink 4.6s ease-in-out infinite}
      .pup{animation:bob 3.6s ease-in-out infinite}
      .p1{animation:tw 2.4s ease-in-out infinite}
      .p2{animation:tw 3.1s ease-in-out .6s infinite}
      .p3{animation:tw 2.8s ease-in-out 1.2s infinite}
    </style>
  </defs>

  <rect width="1200" height="300" fill="#08080D"/>
  <rect width="1200" height="300" fill="url(#glow)"/>
  <rect width="1200" height="300" fill="url(#glow2)"/>

  <!-- drifting dust -->
  <g fill="#00C805">
    <circle class="p1" cx="110" cy="70" r="2"/>
    <circle class="p2" cx="220" cy="215" r="1.6"/>
    <circle class="p3" cx="330" cy="52" r="1.5"/>
    <circle class="p2" cx="905" cy="60" r="2"/>
    <circle class="p1" cx="1120" cy="235" r="1.8"/>
    <circle class="p3" cx="1165" cy="90" r="1.5"/>
    <circle class="p1" cx="60" cy="248" r="1.6"/>
  </g>
  <g fill="#FF4500">
    <circle class="p3" cx="170" cy="140" r="1.5"/>
    <circle class="p1" cx="1035" cy="42" r="1.5"/>
  </g>

  <!-- paw trail, walking in from the left -->
  <g fill="#F6F3ED" opacity=".14" transform="translate(60,120) rotate(24)">
    <g><ellipse cx="0" cy="0" rx="9" ry="7"/><circle cx="-8" cy="-9" r="3.4"/><circle cx="0" cy="-12" r="3.4"/><circle cx="8" cy="-9" r="3.4"/></g>
    <g transform="translate(34,44)"><ellipse cx="0" cy="0" rx="9" ry="7"/><circle cx="-8" cy="-9" r="3.4"/><circle cx="0" cy="-12" r="3.4"/><circle cx="8" cy="-9" r="3.4"/></g>
    <g transform="translate(6,96)"><ellipse cx="0" cy="0" rx="9" ry="7"/><circle cx="-8" cy="-9" r="3.4"/><circle cx="0" cy="-12" r="3.4"/><circle cx="8" cy="-9" r="3.4"/></g>
  </g>

  <text x="580" y="64" text-anchor="middle" class="eyebrow">$SNOOFI · LIVE ON ROBINHOOD CHAIN</text>
  <text x="580" y="188" text-anchor="middle" class="big">SNOOFI</text>
  <text x="580" y="238" text-anchor="middle" class="tag">the <tspan fill="#E9EAF0" font-weight="800">goodest boy</tspan> on the blockchain.</text>

  <!-- the pup (outer g positions him; CSS animation on the inner g would clobber a transform attribute) -->
  <g transform="translate(1063,118)">
  <g class="pup">
    <!-- antenna -->
    <g class="antenna">
      <line x1="0" y1="-38" x2="11" y2="-74" stroke="#F6F3ED" stroke-width="5" stroke-linecap="round"/>
      <circle cx="13" cy="-80" r="7" fill="#F6F3ED"/>
    </g>
    <!-- ears -->
    <rect x="-62" y="-16" width="22" height="48" rx="11" fill="#F6F3ED" transform="rotate(16 -51 8)"/>
    <rect x="40" y="-16" width="22" height="48" rx="11" fill="#F6F3ED" transform="rotate(-16 51 8)"/>
    <!-- body -->
    <path d="M -33 30 Q -42 96 -26 104 L 26 104 Q 42 96 33 30 Q 16 42 0 42 Q -16 42 -33 30 Z" fill="#F6F3ED"/>
    <!-- haunches + paws -->
    <ellipse cx="-30" cy="96" rx="15" ry="12" fill="#F6F3ED"/>
    <ellipse cx="30" cy="96" rx="15" ry="12" fill="#F6F3ED"/>
    <ellipse cx="-12" cy="106" rx="9" ry="5.5" fill="#FFFDF8"/>
    <ellipse cx="12" cy="106" rx="9" ry="5.5" fill="#FFFDF8"/>
    <!-- collar -->
    <rect x="-27" y="34" width="54" height="11" rx="5.5" fill="#00C805"/>
    <!-- head -->
    <circle cx="0" cy="0" r="42" fill="#F6F3ED"/>
    <!-- eyes -->
    <g class="eye"><circle cx="-15" cy="-5" r="7" fill="#FF4500"/><circle cx="-13" cy="-7" r="2" fill="#fff"/></g>
    <g class="eye"><circle cx="15" cy="-5" r="7" fill="#FF4500"/><circle cx="17" cy="-7" r="2" fill="#fff"/></g>
    <!-- nose + smile -->
    <ellipse cx="0" cy="11" rx="7" ry="5.5" fill="#1c1822"/>
    <path d="M -10 19 Q 0 26 10 19" stroke="#1c1822" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  </g>
  </g>
</svg>
